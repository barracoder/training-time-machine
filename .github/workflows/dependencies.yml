name: Dependencies

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Audit root dependencies
        run: npm audit --audit-level=high
      - name: Audit website dependencies
        run: npm audit --audit-level=high
        working-directory: website

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # This repo is MIT: any dependency a PR introduces must carry an
      # MIT-compatible permissive license from the allow-list below.
      # react-leaflet is Hippocratic-2.1 (ethical-source, not OSI) — exempted
      # as known pre-existing debt so version bumps aren't blocked; remove the
      # exemption if it's ever replaced.
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          allow-licenses: MIT, MIT-0, ISC, BSD-2-Clause, BSD-3-Clause, 0BSD, Apache-2.0, Unlicense, CC0-1.0, BlueOak-1.0.0, Python-2.0
          allow-dependencies-licenses: pkg:npm/react-leaflet, pkg:npm/%40react-leaflet/core
