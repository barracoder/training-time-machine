name: PR checks

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  unit-tests:
    name: Import tools tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: strava
          MYSQL_USER: strava
          MYSQL_PASSWORD: strava
          MYSQL_ROOT_PASSWORD: strava-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ustrava -pstrava"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Runs the csv/export unit tests plus the MCP integration suite, which
      # extracts the fixture archive into the service MySQL.
      - run: npm test

  website-api-tests:
    name: Website API tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: strava
          MYSQL_USER: strava
          MYSQL_PASSWORD: strava
          MYSQL_ROOT_PASSWORD: strava-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ustrava -pstrava"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json
      - name: Seed database from fixture archive
        run: |
          npm ci
          node dist/extract.js test/fixtures/export
      - run: npm ci
        working-directory: website
      - run: npm test
        working-directory: website

  playwright:
    name: Playwright e2e
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: strava
          MYSQL_USER: strava
          MYSQL_PASSWORD: strava
          MYSQL_ROOT_PASSWORD: strava-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ustrava -pstrava"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json
      - name: Seed database from fixture archive
        run: |
          npm ci
          node dist/extract.js test/fixtures/export
      - run: npm ci
        working-directory: website
      - run: npx playwright install --with-deps chromium
        working-directory: website
      - run: npm run build
        working-directory: website
      - run: npm run test:e2e
        working-directory: website
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: Audit root dependencies
        run: npm audit --audit-level=high
      - name: Audit website dependencies
        run: npm audit --audit-level=high
        working-directory: website

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Flags known-vulnerable or copyleft-licensed packages introduced by the
      # PR. Existing deps are not re-checked — the audit job covers those.
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0
