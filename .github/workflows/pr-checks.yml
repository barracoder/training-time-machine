name: PR checks

on:
  pull_request:
    branches: [develop]

jobs:
  unit-tests:
    name: Import tools tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: strava
          MYSQL_USER: strava
          MYSQL_PASSWORD: strava
          MYSQL_ROOT_PASSWORD: strava-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ustrava -pstrava"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Runs the csv/export unit tests plus the MCP integration suite, which
      # extracts the fixture archive into the service MySQL.
      - run: npm test

  website-api-tests:
    name: Website API tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: strava
          MYSQL_USER: strava
          MYSQL_PASSWORD: strava
          MYSQL_ROOT_PASSWORD: strava-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ustrava -pstrava"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json
      - name: Seed database from fixture archive
        run: |
          npm ci
          node dist/extract.js test/fixtures/export
      - run: npm ci
        working-directory: website
      - run: npm test
        working-directory: website

  playwright:
    name: Playwright e2e
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: strava
          MYSQL_USER: strava
          MYSQL_PASSWORD: strava
          MYSQL_ROOT_PASSWORD: strava-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ustrava -pstrava"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            website/package-lock.json
      - name: Seed database from fixture archive
        run: |
          npm ci
          node dist/extract.js test/fixtures/export
      - run: npm ci
        working-directory: website
      - run: npx playwright install --with-deps chromium
        working-directory: website
      - run: npm run build
        working-directory: website
      - run: npm run test:e2e
        working-directory: website
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 7
